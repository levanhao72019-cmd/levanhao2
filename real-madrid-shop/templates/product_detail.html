{% extends "base.html" %}

{% block content %}
<div class="container">
    <div style="display: flex; gap: 4rem; align-items: center; background: var(--rm-white); padding: 3rem; border-radius: 12px; box-shadow: var(--shadow);">
        <div style="flex: 1;">
            <img src="{{ product.image }}" alt="{{ product.name }}" style="width: 100%; border-radius: 8px;">
        </div>
        <div style="flex: 1;">
            <p class="product-category" style="font-size: 1.2rem;">{{ product.category }}</p>
            <h1 style="font-size: 2.5rem; margin: 1rem 0;">{{ product.name }}</h1>
            <p style="font-size: 1.5rem; font-weight: 800; color: var(--rm-blue); margin-bottom: 2rem;">{{ "{:,.0f}".format(product.price) }} VNĐ</p>
            
            <div style="margin-bottom: 2rem;">
                <label style="font-weight: 600;">Chọn Size:</label>
                <div style="display: flex; gap: 1rem; margin-top: 0.5rem;">
                    <span style="padding: 0.5rem 1rem; border: 1px solid #ddd; cursor: pointer;">S</span>
                    <span style="padding: 0.5rem 1rem; border: 1px solid #ddd; cursor: pointer;">M</span>
                    <span style="padding: 0.5rem 1rem; border: 1px solid #ddd; cursor: pointer; background: var(--rm-blue); color: white;">L</span>
                    <span style="padding: 0.5rem 1rem; border: 1px solid #ddd; cursor: pointer;">XL</span>
                </div>
            </div>

            <p style="color: #666; margin-bottom: 3rem;">{{ product.description }}</p>
            
            <a href="{{ url_for('add_to_cart', product_id=product.id) }}" class="btn btn-primary btn-block" style="font-size: 1.2rem; padding: 1.2rem;">
                <i class="fas fa-shopping-cart"></i> Thêm Vào Giỏ Hàng
            </a>
        </div>
    </div>
</div>
{% endblock %}
